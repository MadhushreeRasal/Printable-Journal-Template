<!DOCTYPE html>
<html>
	<head>
		<title>
			Daily Journal
		</title>
		<link rel="stylesheet" href="index.css">
		<meta charset="UTF-8">
		<meta name="description" content="Journaling helps in the process of planning and self-reflection. This webpage helps you keep a track of of your daily activities in a fun and creaive way. its a free template that you can print and use for daily journaling and express and reflect on yourself by keeping track of your daily activities, things to do, highlight of the day and achievement of the day along with your mood. there's also a cretive space for you to express your thoughts in an unfiltered way (known as brain dump), and finally finish it off with a small doodle/ sketch.">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="keywords" content="Journal, Journaling, Daily journal, Journal template, Printable journal template, Diary">
		<meta name="author" content="Madhushree Rasal">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Dynalight&family=Imperial+Script&family=Margarine&family=Trade+Winds&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
	</head>
	<body>
		<h1 class="imperial-script-regular">Daily Journal</h1>
		<img class="design" src="https://static.vecteezy.com/system/resources/thumbnails/051/556/801/small_2x/pink-camellia-flowers-with-green-leaves-in-a-seamless-border-camellia-japonica-watercolor-clipart-this-delicate-floral-design-is-ideal-for-invitations-greeting-cards-or-stationery-borders-png.png" alt="floral design" height="100" width="300">
		<div class="log left dynalight-regular ">
			<p>Daily Log</p>
			<img class="img1" src="https://png.pngtree.com/png-vector/20250401/ourmid/pngtree-illustration-of-floral-border-with-white-and-pink-whimsical-flowers-green-png-image_15923144.png" height="150" width="400">
		</div>
		<div class="to_do">
			<p class="dynalight-regular ">To-Do List</p>
		</div>
		<div class="highlight left">
			<p class="dynalight-regular ">Highlight of the day</p>
		</div>
		<div class="achivement left">
			<p class="dynalight-regular ">Achievement of the Day</p>
		</div>
		<div class="mood left">
			<p class="dynalight-regular ">Mood Today</p>
		</div>
		<div class="doodle left">
			<p class="dynalight-regular ">Sketch of the day</p>
		</div>
		<div class="thoughts">
			<p class="dynalight-regular ">Thought Space (you can express your stream of unfiltered conciousness thoughts to clear your mind) </p>
		</div>
		<img class="pattern" src="https://png.pngtree.com/png-vector/20250429/ourmid/pngtree-pink-and-red-rose-flower-corner-clipart-image-png-image_16062005.png" height="300" width="300" alt="design">
		<div class="border">
			<img class="img2 left" src="https://static.vecteezy.com/system/resources/thumbnails/051/556/801/small_2x/pink-camellia-flowers-with-green-leaves-in-a-seamless-border-camellia-japonica-watercolor-clipart-this-delicate-floral-design-is-ideal-for-invitations-greeting-cards-or-stationery-borders-png.png" alt="floral border" height="100" width="300">
		<img class="img3 left" src="https://static.vecteezy.com/system/resources/thumbnails/051/556/801/small_2x/pink-camellia-flowers-with-green-leaves-in-a-seamless-border-camellia-japonica-watercolor-clipart-this-delicate-floral-design-is-ideal-for-invitations-greeting-cards-or-stationery-borders-png.png" alt="floral border" height="100" width="300">
		<img class="img3 left" src="https://static.vecteezy.com/system/resources/thumbnails/051/556/801/small_2x/pink-camellia-flowers-with-green-leaves-in-a-seamless-border-camellia-japonica-watercolor-clipart-this-delicate-floral-design-is-ideal-for-invitations-greeting-cards-or-stationery-borders-png.png" alt="floral border" height="100" width="300">
		</div>
	</body>
</html>
